services:
  db:
    image: postgres:15-alpine
    container_name: zapisi_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zapisi
    ports:
      - "7235:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zapisi"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zapisi_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/zapisi
      ADMIN_PASSWORD: admin
      PORT: 7100
    ports:
      - "7100:7100"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PORT: 7100
        VITE_BACKEND_URL: http://localhost
    container_name: zapisi_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
